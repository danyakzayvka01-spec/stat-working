<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMM Dashboard | Pro</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0c0e12;
            --sidebar-color: #161a21;
            --accent-color: #00d4ff;
            --card-bg: #1c222d;
            --text-main: #ffffff;
            --text-dim: #a0aec0;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-main); overflow: hidden; }

        .app-container { display: flex; height: 100vh; width: 100vw; }

        /* БОКОВАЯ ПАНЕЛЬ */
        .sidebar { width: 260px; background: var(--sidebar-color); border-right: 1px solid #222; padding: 30px 15px; display: flex; flex-direction: column; flex-shrink: 0; }
        .profile { text-align: center; margin-bottom: 30px; }
        .profile img { width: 70px; height: 70px; border-radius: 20px; border: 2px solid var(--accent-color); margin-bottom: 10px; }
        
        .nav-tabs { display: flex; flex-direction: column; gap: 8px; }
        .tab-btn { background: transparent; border: none; color: var(--text-dim); padding: 14px; border-radius: 12px; text-align: left; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .tab-btn.active { background: linear-gradient(135deg, #00d4ff 0%, #0072ff 100%); color: #000; font-weight: 600; }

        /* КОНТЕНТ */
        .main-content { flex-grow: 1; padding: 25px; display: flex; flex-direction: column; padding-bottom: 80px; overflow-y: auto; }

        /* ВИДЖЕТЫ */
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid #333; position: relative; }
        .stat-label { color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 32px; font-weight: 700; margin: 8px 0; }
        .stat-desc { color: #5c6a7e; font-size: 11px; }
        
        .progress-container { width: 100%; height: 6px; background: #000; border-radius: 10px; margin-top: 12px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--accent-color); box-shadow: 0 0 10px var(--accent-color); width: 0%; transition: 1s ease; }

        /* ТАБЛИЦА */
        .table-frame { flex-grow: 1; background: #1a1a1a; border-radius: 25px; border: 1px solid #333; overflow: hidden; display: none; }
        .table-frame.active { display: block; }
        iframe { width: 100%; height: 100%; border: none; filter: contrast(1.1); }

        /* ФУТЕР */
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: var(--sidebar-color); border-top: 1px solid #222; display: flex; align-items: center; justify-content: space-between; padding: 0 25px; }
        .control-btn { background: #222; border: 1px solid #333; color: #fff; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-size: 13px; margin-left: 8px; }
        .control-btn:hover { background: var(--accent-color); color: #000; }

        /* ОКНО НАСТРОЕК */
        #settingsPanel {
			position: fixed;
			inset: 0;
			background: rgba(0, 0, 0, 0.85);
			backdrop-filter: blur(8px);
			display: none;
			align-items: center;
			justify-content: center;
			z-index: 10000;
		}

		.settings-box {
			background: #1c222d;
			width: 380px;
			border-radius: 28px;
			border: 1px solid rgba(255, 255, 255, 0.1);
			box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
			overflow: hidden;
			animation: scaleIn 0.3s ease;
		}

		@keyframes scaleIn {
			from { transform: scale(0.9); opacity: 0; }
			to { transform: scale(1); opacity: 1; }
		}

		.settings-header {
			padding: 25px;
			background: rgba(255, 255, 255, 0.03);
			text-align: center;
			border-bottom: 1px solid rgba(255, 255, 255, 0.05);
		}

		.settings-header h3 { margin: 0; font-size: 18px; color: var(--accent-color); }
		.settings-header p { margin: 5px 0 0; font-size: 12px; color: #666; }

		.settings-content { padding: 20px 25px; }

		.settings-group { margin-bottom: 20px; }
		.group-title {
			font-size: 11px;
			text-transform: uppercase;
			color: #555;
			margin-bottom: 10px;
			font-weight: 700;
			letter-spacing: 1px;
		}

		.settings-box input {
			background: #0a0c10;
			border: 1px solid #2d3748;
			color: #fff;
			padding: 12px 15px;
			border-radius: 12px;
			font-size: 14px;
			width: 100%;
			box-sizing: border-box;
			outline: none;
			transition: 0.3s;
			margin-bottom: 8px;
		}

		.settings-box input:focus { border-color: var(--accent-color); background: #000; }

		.input-row { display: flex; gap: 10px; }

		.settings-footer { padding: 0 25px 25px; display: flex; flex-direction: column; gap: 10px; }

		.save-btn {
			background: var(--accent-color);
			color: #000;
			border: none;
			padding: 15px;
			border-radius: 14px;
			font-weight: 700;
			cursor: pointer;
			transition: 0.3s;
		}

		.save-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3); }

		.cancel-btn {
			background: transparent;
			color: #666;
			border: 1px solid #2d3748;
			padding: 12px;
			border-radius: 14px;
			cursor: pointer;
			font-size: 13px;
			transition: 0.3s;
		}

		.cancel-btn:hover { color: #fff; border-color: #444; }
		.add-tab-btn {
			margin-top: 20px;
			background: transparent;
			border: 1px dashed var(--accent-color);
			color: var(--accent-color);
			padding: 10px;
			border-radius: 12px;
			cursor: pointer;
			font-size: 13px;
			transition: 0.3s;
		}
		.add-tab-btn:hover {
			background: rgba(0, 212, 255, 0.1);
			transform: scale(1.02);
		}
		.tab-btn-wrapper {
			position: relative;
			display: flex;
			align-items: center;
		}

		.delete-tab-btn {
			position: absolute;
			right: 10px;
			background: rgba(255, 0, 0, 0.2);
			color: #ff4d4d;
			border: none;
			border-radius: 6px;
			width: 22px;
			height: 22px;
			cursor: pointer;
			font-size: 14px;
			display: none; /* Скрыта по умолчанию */
			align-items: center;
			justify-content: center;
			transition: 0.2s;
		}

		.tab-btn-wrapper:hover .delete-tab-btn {
			display: flex; /* Показываем при наведении на обертку кнопки */
		}

		.delete-tab-btn:hover {
			background: #ff4d4d;
			color: #000;
		}
    </style>
</head>
<body>

    <!-- ОКНО НАСТРОЕК -->
    <div id="settingsPanel">
		<div class="settings-box">
			<div class="settings-header">
				<h3>⚙️ Настройка дашборда</h3>
				<p>Настройте показатели для текущей вкладки</p>
			</div>

			<div class="settings-content">
				<!-- Блок Виджета 1 -->
				<div class="settings-group">
					<div class="group-title">Виджет 1</div>
					<input type="text" id="nameTotal" placeholder="Название (напр. Продажи)">
					<div class="input-row">
						<input type="number" id="inTotal" placeholder="Факт">
						<input type="number" id="goalTotal" placeholder="Цель">
					</div>
				</div>

				<!-- Блок Виджета 2 -->
				<div class="settings-group">
					<div class="group-title">Виджет 2</div>
					<input type="text" id="nameClosed" placeholder="Название (напр. Сделки)">
					<div class="input-row">
						<input type="number" id="inClosed" placeholder="Факт">
						<input type="number" id="goalClosed" placeholder="Цель">
					</div>
				</div>
			</div>

			<div class="settings-footer">
				<button class="save-btn" onclick="saveSettings()">Сохранить изменения</button>
				<button class="cancel-btn" onclick="toggleSettings()">Отмена</button>
			</div>
		</div>
	</div>

    <div class="app-container">
        <aside class="sidebar">
            <div class="profile">
                <img src="https://foni.papik.pro/uploads/posts/2024-09/foni-papik-pro-spft-p-kartinki-khaker-na-prozrachnom-fone-4.png" alt="Avatar">
                <div style="font-weight: 700;">Проверенный пользователь</div>
                <div style="color:#4caf50; font-size:11px;">● В сети</div>
            </div>
            <nav class="nav-tabs">
                <button class="tab-btn active" onclick="openTab(event, 'tab1')">👥 Статистика заявки/закрыв</button>
                <button class="tab-btn" onclick="openTab(event, 'tab2')">👥 Статистика холодных звонков</button>
				<button class="add-tab-btn" onclick="toggleAddModal()">+ Добавить таблицу</button>
            </nav>
				<div id="addModal" class="settings-panel" style="display: none;">
					<div class="settings-box">
					<h3>➕ Новая таблица</h3>
					<div class="setting-item">
						<label>Название вкладки:</label>
						<input type="text" id="newTabName" placeholder="Напр: Отчет за июнь">
					</div>
					<div class="setting-item">
						<label>Ссылка на публикацию (pubhtml):</label>
						<input type="text" id="newTabUrl" placeholder="https://google.com...">
					</div>
					<button class="save-btn" onclick="addNewTab()">Создать вкладку</button>
					<button class="cancel-btn" onclick="toggleAddModal()">Отмена</button>
				</div>
			</div>
        </aside>

        <main class="main-content">
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-label">Количество зелённых передач</div>
                    <div class="stat-value" id="val-total">0</div>
                    <div class="stat-desc" id="desc-total">цель: 100</div>
                    <div class="progress-container"><div class="progress-bar" id="bar-total"></div></div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Количество депозитов</div>
                    <div class="stat-value" id="val-closed" style="color:#4caf50">0</div>
                    <div class="stat-desc" id="desc-closed">цель: 20</div>
                    <div class="progress-container"><div class="progress-bar" id="bar-closed" style="background:#4caf50"></div></div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Конверсия</div>
                    <div class="stat-value" id="val-conv" style="color:var(--accent-color)">0%</div>
                    <div class="stat-desc">автоматический расчет</div>
                    <div class="progress-container"><div class="progress-bar" id="bar-conv"></div></div>
                </div>
            </div>

            <div id="tab1" class="table-frame active">
                <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQP0KFNEsju_dn8jLRzerBOCGjmRJFQcQpvhj2SJ5n4YZ9yj2kNRSn-ENLp6KyNk8shzSJyNaIrz-Wu/pubhtml?widget=true&amp;headers=false"></iframe>
            </div>
            <div id="tab2" class="table-frame">
                <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vR8_u0roWMELlRRvbJ1f3AoqHQSFtUT5i2KLiIvyf5ZLx4oSAOOoE5W_Gu-TR4DJNQ4ZUBsSiZ-6wAn/pubhtml"></iframe>
            </div>
        </main>
    </div>

    <footer class="bottom-bar">
        <div id="clock" style="color:var(--accent-color); font-weight:700">00:00:00</div>
        <div>
            <button class="control-btn" onclick="refreshTable()">🔄 Обновить</button>
            <button class="control-btn" onclick="toggleSettings()">⚙️ Настройки</button>
        </div>
    </footer>

    <script>
        let currentTab = 'tab1';

        function openTab(evt, tabId) {
            currentTab = tabId;
            document.querySelectorAll('.table-frame').forEach(f => f.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            evt.currentTarget.classList.add('active');
            loadTabSettings();
        }

        function toggleSettings() {
            const p = document.getElementById('settingsPanel');
            p.style.display = (p.style.display === 'flex') ? 'none' : 'flex';
        }

        function saveSettings() {
			const d = {
				// Значения и цели
				tV: document.getElementById('inTotal').value,
				tG: document.getElementById('goalTotal').value,
				cV: document.getElementById('inClosed').value,
				cG: document.getElementById('goalClosed').value,
				// НАЗВАНИЯ
				nT: document.getElementById('nameTotal').value || "Показатель 1",
				nC: document.getElementById('nameClosed').value || "Показатель 2"
			};
				localStorage.setItem('data_' + currentTab, JSON.stringify(d));
				applyUI(d);
				toggleSettings();
		}
        function loadTabSettings() {
			const s = localStorage.getItem('data_' + currentTab);
			// Если данных нет, используем стандартные строки, а не undefined
			const d = s ? JSON.parse(s) : { 
				tV: 0, tG: 100, cV: 0, cG: 20, 
				nT: "Всего передано", nC: "Закрыто сделок" 
			};
			
			document.getElementById('inTotal').value = d.tV || 0;
			document.getElementById('goalTotal').value = d.tG || 100;
			document.getElementById('inClosed').value = d.cV || 0;
			document.getElementById('goalClosed').value = d.cG || 20;
			
			// Исправляем ошибку undefined:
			document.getElementById('nameTotal').value = d.nT || "Всего передано";
			document.getElementById('nameTotal').placeholder = "Назовите первый виджет";
			
			document.getElementById('nameClosed').value = d.nC || "Закрыто сделок";
			document.getElementById('nameClosed').placeholder = "Назовите второй виджет";
			
			applyUI(d);
		}

        function applyUI(d) {
			// Обновляем названия (надписи)
			document.querySelectorAll('.stat-label')[0].innerText = d.nT;
			document.querySelectorAll('.stat-label')[1].innerText = d.nC;

			// Обновляем цифры и цели
			document.getElementById('val-total').innerText = d.tV;
			document.getElementById('val-closed').innerText = d.cV;
			document.getElementById('desc-total').innerText = 'цель: ' + d.tG;
			document.getElementById('desc-closed').innerText = 'цель: ' + d.cG;

			// Обновляем полоски
			const p1 = Math.min((d.tV / d.tG) * 100, 100) || 0;
			const p2 = Math.min((d.cV / d.cG) * 100, 100) || 0;
			document.getElementById('bar-total').style.width = p1 + '%';
			document.getElementById('bar-closed').style.width = p2 + '%';
			
			// Авто-расчет конверсии
			const conv = d.tV > 0 ? Math.round((d.cV / d.tV) * 100) : 0;
			document.getElementById('val-conv').innerText = conv + '%';
			document.getElementById('bar-conv').style.width = Math.min(conv, 100) + '%';
		}

        function refreshTable() {
            const ifr = document.querySelector('.table-frame.active iframe');
            ifr.src = ifr.src;
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        window.onload = loadTabSettings;
		
				// Массив для хранения ваших кастомных вкладок
		let customTabs = JSON.parse(localStorage.getItem('customTabs')) || [];

		function toggleAddModal() {
			const m = document.getElementById('addModal');
			m.style.display = (m.style.display === 'none') ? 'flex' : 'none';
		}

		function addNewTab() {
			const nameInput = document.getElementById('newTabName');
			const urlInput = document.getElementById('newTabUrl');
			
			let name = nameInput.value.trim();
			let rawUrl = urlInput.value.trim();

			if (!name || !rawUrl) return alert("Заполните поля!");

			// 1. Очищаем ссылку от кавычек и кода iframe, если его вставили целиком
			let cleanUrl = rawUrl.replace(/<iframe[^>]*src=["']|["'][^>]*><\/iframe>/gi, '').replace(/["']/g, '').trim();

			// 2. Если вставили ссылку для редактирования, исправляем на публикацию
			if (cleanUrl.includes('/edit')) {
				cleanUrl = cleanUrl.split('/edit')[0] + '/pubhtml';
			}

			// 3. Убираем всё, что идет после pubhtml (старые параметры), чтобы добавить свои заново
			if (cleanUrl.includes('pubhtml')) {
				cleanUrl = cleanUrl.split('pubhtml')[0] + 'pubhtml';
			}

			const newId = 'tab_' + Date.now();
			// Сохраняем ТОЛЬКО чистую ссылку
			const newTab = { id: newId, name: name, url: cleanUrl };

			customTabs.push(newTab);
			localStorage.setItem('customTabs', JSON.stringify(customTabs));
			
			location.reload(); 
		}


		function renderTabs() {
			const nav = document.querySelector('.nav-tabs');
			const content = document.querySelector('.main-content');

			customTabs.forEach(tab => {
				if (!document.getElementById('wrapper_' + tab.id)) {
					// Создаем обертку
					const wrapper = document.createElement('div');
					wrapper.className = 'tab-btn-wrapper';
					wrapper.id = 'wrapper_' + tab.id;

					// Создаем кнопку вкладки
					const btn = document.createElement('button');
					btn.className = 'tab-btn';
					btn.style.width = '100%';
					btn.id = 'btn_' + tab.id;
					btn.innerText = '📂 ' + tab.name;
					btn.onclick = (e) => openTab(e, tab.id);

					// Создаем кнопку удаления
					const delBtn = document.createElement('button');
					delBtn.className = 'delete-tab-btn';
					delBtn.innerHTML = '×';
					delBtn.title = 'Удалить таблицу';
					delBtn.onclick = (e) => {
						e.stopPropagation(); // Чтобы не сработало открытие вкладки
						deleteTab(tab.id);
					};

					wrapper.appendChild(btn);
					wrapper.appendChild(delBtn);
					nav.appendChild(wrapper);

					// Создаем контейнер таблицы
					const frameDiv = document.createElement('div');
					frameDiv.id = tab.id;
					frameDiv.className = 'table-frame';
					// Найдите эту строку внутри renderTabs и замените её:
					frameDiv.innerHTML = `<iframe src="${tab.url}?rm=minimal"></iframe>`;
					content.appendChild(frameDiv);
				}
			});
		}
		
		function deleteTab(tabId) {
			if (confirm("Вы точно хотите удалить эту таблицу и все её настройки?")) {
				// 1. Удаляем из массива customTabs
				customTabs = customTabs.filter(t => t.id !== tabId);
				
				// 2. Обновляем LocalStorage (список вкладок и настройки виджетов)
				localStorage.setItem('customTabs', JSON.stringify(customTabs));
				localStorage.removeItem('data_' + tabId); // Чистим память от настроек этой таблицы
				
				// 3. Перезагружаем страницу для обновления интерфейса
				location.reload();
			}
		}
		// Вызовите renderTabs() при загрузке страницы
		window.addEventListener('load', renderTabs);

    </script>
</body>
</html>
